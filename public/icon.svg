<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full teal background (matches the in-app icon container colour) -->
  <rect width="512" height="512" fill="#2d6464"/>
  <!-- Camera outline in warm white — same design as the in-app icon, scaled up -->
  <g fill="none" stroke="#f0ece4" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camera body -->
    <rect x="80" y="198" width="352" height="188" rx="28"/>
    <!-- Viewfinder hump, centred -->
    <path d="M178 198 V142 a16 16 0 0 1 16-16 H318 a16 16 0 0 1 16 16 V198"/>
    <!-- Lens outer ring -->
    <circle cx="256" cy="292" r="68"/>
    <!-- Lens inner ring -->
    <circle cx="256" cy="292" r="34"/>
  </g>
</svg>
